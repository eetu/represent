# bacon — background cargo runner for local dev (run `bacon` in backend/).
# Default job runs the server and restarts it on change; env (DEV_AUTH etc.)
# comes from backend/.env via dotenvy (cp .env.example .env).
default_job = "run"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--color", "always", "--", "-D", "warnings"]
need_stdout = false

[jobs.run]
command = ["cargo", "run", "--color", "always"]
need_stdout = true
allow_warnings = true
background = true
on_change_strategy = "kill_then_restart"
watch = ["src", ".env"]
