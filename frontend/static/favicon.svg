<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- represent glyph: a script page whose active line is lit by the warm dot.
       Adaptive: inline attrs are the light default (also what rsvg-convert
       bakes into the PNGs); the media query only overrides in scheme-aware
       browsers (live tab + Chromium PWA). Family stroke language: #525252
       stroke, #f78f08 accent, white tile. -->
  <style>
    @media (prefers-color-scheme: dark) {
      .tile { fill: #252525; }
      .stroke { stroke: #f0f0f0; }
    }
  </style>
  <rect class="tile" width="512" height="512" fill="#ffffff" />
  <g transform="translate(76 76) scale(15)" fill="none" stroke-width="1.4"
     stroke-linecap="round" stroke-linejoin="round">
    <path class="stroke" stroke="#525252" d="M6 2.5h9.5L19 6v15.5H6z" />
    <path class="stroke" stroke="#525252" d="M9 8.5h6" />
    <path class="stroke" stroke="#525252" d="M12.6 12.5h2.4" />
    <path class="stroke" stroke="#525252" d="M9 16.5h3.5" />
    <circle cx="9.9" cy="12.5" r="1.2" fill="#f78f08" />
  </g>
</svg>
